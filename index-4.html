<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submerged</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #hud {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      pointer-events: none;
    }
    #load-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      color: #a8d5b5;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #load-btn:hover { background: rgba(255,255,255,0.13); }
    #status {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(180,220,190,0.35);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="hud">
  <button id="load-btn" onclick="loadAudio()">⊕ Load Audio Track</button>
  <span id="status">no track loaded — demo mode</span>
</div>

<a-scene
  background="color: #060e0a"
  fog="type: exponential; color: #0a1a10; density: 0.035"
  renderer="antialias: true; colorManagement: true"
  vr-mode-ui="enabled: true"
>


  <!-- ═══════════════════════════════════════
       CAMERA RIG
  ════════════════════════════════════════ -->
  <a-entity id="rig" position="0 1.6 0" camera-drift environment="dressing: <mushrooms>">
    <a-camera
      look-controls="pointerLockEnabled: true"
      wasd-controls="acceleration: 12"
      near="0.1" far="40"
    >
      <a-cursor color="#a8d5b5" opacity="0.4" scale="0.35 0.35 0.35"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ═══════════════════════════════════════
       LIGHTING
  ════════════════════════════════════════ -->
  <a-light type="ambient" color="#0d2416" intensity="1.4"></a-light>

  <a-light id="light-main"
   type="point" color="#c27ba0" intensity="1.8"

    distance="20" position="0 8 -2">
  </a-light>

  <a-light id="light-side"
    type="point" color="#0e4a28" intensity="1.1"
    distance="14" position="-6 3 0">
  </a-light>

  <a-light id="light-bass"
    type="point" color="#2dcc7a" intensity="1.0"
    distance="12" position="0 4 -6">
  </a-light>

  <a-light id="light-treble"
    type="point" color="#80ffb0" intensity="0.5"
    distance="8" position="3 5 -10">
  </a-light>

  <!-- ═══════════════════════════════════════
       ROOM 
  ════════════════════════════════════════ -->

  <a-plane position="0 0 0" rotation="-90 0 0"
    width="14" height="20" color="#060f08"
    metalness="0.1" roughness="1.0">
  </a-plane>

  <a-plane position="0 6 0" rotation="90 0 0"
    width="14" height="20" color="#060f07" roughness="1.0">
  </a-plane>

  <a-plane position="0 3 -10" rotation="0 0 0"
    width="14" height="6" color="#071009" roughness="1.0">
  </a-plane>

  <a-plane position="-7 3 0" rotation="0 90 0"
    width="20" height="6" color="#071009" roughness="1.0">
  </a-plane>
<!-- plafond : -->

  <a-plane position="7 3 0" rotation="0 -90 0"
    width="20" height="6" color="#071009" roughness="1.0">
  </a-plane>

  <!-- ═══════════════════════════════════════
       CAUSTIC LIGHT PANELS
  ════════════════════════════════════════ -->
  <a-plane id="caustic-back"
    position="0 3 -9.9" rotation="0 0 0"
    width="13" height="5.8"
    material="color:#2dcc7a; opacity:0.04; transparent:true; side:front; shader:flat">
    <a-animation attribute="material.opacity"
      from="0.02" to="0.08" dur="2800"
      direction="alternate" repeat="indefinite" easing="easeInOutSine">
    </a-animation>
  </a-plane>

  <a-plane id="caustic-left"
    position="-6.9 3 -4" rotation="0 90 0"
    width="14" height="5.8"
    material="color:#1de9b6; opacity:0.03; transparent:true; side:front; shader:flat">
    <a-animation attribute="material.opacity"
      from="0.015" to="0.065" dur="3500"
      direction="alternate" repeat="indefinite" easing="easeInOutSine">
    </a-animation>
  </a-plane>

  <a-plane id="caustic-right"
    position="6.9 3 -5" rotation="0 -90 0"
    width="14" height="5.8"
    material="color:#26a96c; opacity:0.025; transparent:true; side:front; shader:flat">
    <a-animation attribute="material.opacity"
      from="0.01" to="0.055" dur="4200"
      direction="alternate" repeat="indefinite" easing="easeInOutSine">
    </a-animation>
  </a-plane>

  <a-plane id="caustic-floor"
    position="0 0.01 -5" rotation="-90 0 0"
    width="13" height="18"
    material="color:#3dffaa; opacity:0.03; transparent:true; side:front; shader:flat">
    <a-animation attribute="material.opacity"
      from="0.01" to="0.05" dur="3200"
      direction="alternate" repeat="indefinite" easing="easeInOutSine">
    </a-animation>
  </a-plane>

  <!-- ═══════════════════════════════════════
       FURNITURE — sparse suggestions only
  ════════════════════════════════════════ -->

  <!-- Long shelf — back left wall -->
  <a-box position="-3.5 1.2 -8.5" width="4" height="0.07" depth="0.6"
    color="#0f1e12" roughness="1.0"></a-box>
  <a-box position="-1.8 0.6 -8.5" width="0.06" height="1.2" depth="0.06" color="#0c180f"></a-box>
  <a-box position="-5.2 0.6 -8.5" width="0.06" height="1.2" depth="0.06" color="#0c180f"></a-box>

  <!-- Desk — right side, partially obscured by corals -->

    color="#0d1a10" roughness="1.0"></a-box>
  <a-box position="3.6 0.35 -5.1" width="0.06" height="0.7" depth="0.06" color="#0b160e"></a-box>
  <a-box position="5.4 0.35 -5.1" width="0.06" height="0.7" depth="0.06" color="#0b160e"></a-box>
  <a-box position="3.6 0.35 -5.9" width="0.06" height="0.7" depth="0.06" color="#0b160e"></a-box>
  <a-box position="5.4 0.35 -5.9" width="0.06" height="0.7" depth="0.06" color="#0b160e"></a-box>

  <!-- Toppled chair — front left -->
  <a-box position="-4.5 0.2 -2.5" width="0.5" height="0.06" depth="0.5"
    color="#0c180f" roughness="1.0" rotation="0 20 18"></a-box>
  <a-box position="-4.5 0.6 -2.3" width="0.5" height="0.55" depth="0.05"

       CORAL FOREST — 9 specimens
       3 instances of each of the 3 Smithsonian
       scans, varied position / rotation / scale.
       The same GLB is reused — loaded once,
       placed multiple times (memory-efficient).

       License: CC0 Public Domain
       https://www.si.edu/Termsofuse

       Pocillopora grandis (Dana, 1846) — USNM 700
       Fiji, South Pacific, 1838–1842 (U.S. Exploring Expedition)
       https://sketchfab.com/3d-models/pocillopora-grandis-ec6c9d4d94ba4d4ea68e34bc99ce5131

<script>
  /*
   * Audio visualisation technique adapted from MDN Web Audio API docs:
   * https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API/Visualizations_with_Web_Audio_API
   */

  let audioCtx, analyser, source, dataArray, bufferLength;

  const BASS_END = 10;
  const MID_END  = 100;

  let sBass = 0, sMid = 0, sTreble = 0;
  const SMOOTH = 0.10; // dreamy, slow response

  const moteOrigins = [];


  // ══════════════════════════════════════════════════
  //  COMPONENT: camera-drift
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('camera-drift', {
    init: function () { this.t = 0; },
    tick: function (time, delta) {
      this.t += delta * 0.00022;
      const t = this.t;
      this.el.object3D.position.set(
        Math.sin(t * 0.5)  * (0.14 + sBass * 0.10),
        1.6 + Math.sin(t * 0.8) * 0.08,
        Math.cos(t * 0.35) * (0.10 + sBass * 0.07)
      );
    }
  });


  // ══════════════════════════════════════════════════
  //  COMPONENT: coral-float
  //  Per-coral buoyancy — independent rhythm per specimen
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('coral-float', {
    schema: {
      speed:     { type: 'number', default: 0.4 },
      amplitude: { type: 'number', default: 0.1 },
      phase:     { type: 'number', default: 0   }
    },
    init: function () {
      this.t    = 0;
      this.baseY = this.el.object3D.position.y;
    },
    tick: function (time, delta) {
      this.t += delta * 0.001;
      const d = this.data;
      this.el.object3D.position.y =
        this.baseY + Math.sin(this.t * d.speed + d.phase) * d.amplitude;
      // Slow yaw rotation — like a specimen turning in a current
      this.el.object3D.rotation.y += 0.00015 * d.speed;
    }
  });


  // ══════════════════════════════════════════════════
  //  COMPONENT: audio-reactor
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('audio-reactor', {
    init: function () {
      // Coral groups by band
      this.bassCorals   = Array.from(document.querySelectorAll('.coral-bass'));
      this.midCorals    = Array.from(document.querySelectorAll('.coral-mid'));
      this.trebleCorals = Array.from(document.querySelectorAll('.coral-treble'));

      // Glow spheres by band
      this.bassGlows   = Array.from(document.querySelectorAll('.glow-bass'));
      this.midGlows    = Array.from(document.querySelectorAll('.glow-mid'));
      this.trebleGlows = Array.from(document.querySelectorAll('.glow-treble'));

      this.lMain   = document.querySelector('#light-main');
      this.lSide   = document.querySelector('#light-side');
      this.lBass   = document.querySelector('#light-bass');
      this.lTreble = document.querySelector('#light-treble');

      this.causticBack  = document.querySelector('#caustic-back');
      this.causticFloor = document.querySelector('#caustic-floor');

      this.motes = Array.from(document.querySelectorAll('.mote'));
      this.motes.forEach(function(m, i) {
        const p = m.getAttribute('position');
        moteOrigins[i] = { x: p.x, y: p.y, z: p.z };
      });

      this.t = 0;
    },

    tick: function (time, delta) {
      this.t += delta * 0.001;
      const t = this.t;

      // ── Band values ───────────────────────────────
      var rB, rM, rT;
      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        rB = avg(dataArray, 0,       BASS_END)    / 255;
        rM = avg(dataArray, BASS_END, MID_END)    / 255;
        rT = avg(dataArray, MID_END,  bufferLength) / 255;
      } else {
        rB = 0.22 + 0.16 * Math.abs(Math.sin(t * 0.7));
        rM = 0.18 + 0.14 * Math.abs(Math.sin(t * 0.5 + 1.1));
        rT = 0.12 + 0.10 * Math.abs(Math.sin(t * 0.9 + 2.4));
      }

      sBass   += (rB - sBass)   * SMOOTH;
      sMid    += (rM - sMid)    * SMOOTH;
      sTreble += (rT - sTreble) * SMOOTH;

      // ── Coral scale + glow ────────────────────────
      var groups = [
        { corals: this.bassCorals,   glows: this.bassGlows,   n: sBass   },
        { corals: this.midCorals,    glows: this.midGlows,    n: sMid    },
        { corals: this.trebleCorals, glows: this.trebleGlows, n: sTreble },
      ];

      groups.forEach(function(g) {
        // Scale: gentle — big corals don't need much movement to feel powerful
        var s = 1.0 + g.n * 0.22;
        g.corals.forEach(function(c) {
          if (c) c.object3D.scale.set(s, s, s);
        });
        // Glow opacity
        var op = (0.07 + g.n * 0.25).toFixed(3);
        g.glows.forEach(function(gl) {
          if (gl) gl.setAttribute('material', 'opacity', op);
        });
      });

      // ── Lights ────────────────────────────────────
      if (this.lMain)   this.lMain.setAttribute('intensity',   (1.4 + sBass * 1.4).toFixed(2));
      if (this.lBass)   this.lBass.setAttribute('intensity',   (0.6 + sBass * 2.0).toFixed(2));
      if (this.lTreble) this.lTreble.setAttribute('intensity', (0.3 + sTreble * 1.2).toFixed(2));
      if (this.lSide)   this.lSide.setAttribute('intensity',   (0.8 + sMid * 1.0).toFixed(2));

      // ── Caustics ──────────────────────────────────
      var cOp = (0.03 + sBass * 0.07).toFixed(3);
      if (this.causticBack)  this.causticBack.setAttribute('material',  'opacity', cOp);
      if (this.causticFloor) this.causticFloor.setAttribute('material', 'opacity', (parseFloat(cOp) * 0.6).toFixed(3));

      // ── Sediment drift ────────────────────────────
      this.motes.forEach(function(mote, i) {
        var o = moteOrigins[i];
        if (!o) return;
        var phase  = i * 0.65;
        var speed  = 0.035 + sTreble * 0.025;
        var wobble = 0.10  + sMid    * 0.08;
        // Drift down; wrap: when below floor, snap back to ceiling height
        var rawY = o.y - ((t * speed * 0.5 + phase * 0.12) % 5.0);
        var ny   = rawY < 0 ? rawY + 5.5 : rawY;
        var nx   = o.x + Math.sin(t * 0.28 + phase) * wobble;
        var nz   = o.z + Math.cos(t * 0.18 + phase) * wobble * 0.5;
        mote.object3D.position.set(nx, ny, nz);
      });
    }
  });

  document.querySelector('a-scene').addEventListener('loaded', function () {
    document.querySelector('a-scene').setAttribute('audio-reactor', '');
  });


  function avg(arr, start, end) {
    var sum = 0;
    for (var i = start; i < end; i++) sum += arr[i];
    return sum / (end - start);
  }


  // ══════════════════════════════════════════════════
  //  AUDIO LOADING
  // ══════════════════════════════════════════════════
  function loadAudio() {
    var input    = document.createElement('input');
    input.type   = 'file';
    input.accept = 'audio/*';

    input.onchange = async function (e) {
      var file = e.target.files[0];
      if (!file) return;
      document.getElementById('status').textContent = 'decoding…';
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        if (source) { try { source.stop(); } catch(e) {} }

        analyser         = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        bufferLength     = analyser.frequencyBinCount;
        dataArray        = new Uint8Array(bufferLength);

        var buf = await audioCtx.decodeAudioData(await file.arrayBuffer());
        source        = audioCtx.createBufferSource();
        source.buffer = buf;
        source.loop   = true;
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start(0);

        document.getElementById('status').textContent = '▶ ' + file.name;
        document.getElementById('load-btn').textContent = '⊕ Change Track';
      } catch (err) {
        console.error('Audio error:', err);
        document.getElementById('status').textContent = 'error — see console';
      }
    };
    input.click();
  }
</script>
</body>
