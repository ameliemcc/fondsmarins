<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submerged — Smithsonian Coral Collection</title>

  <!-- A-Frame 1.5 — https://aframe.io -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; }

    #hud {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      pointer-events: none;
    }
    #load-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      color: #a8d5b5;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #load-btn:hover { background: rgba(255,255,255,0.13); }
    #status {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(180,220,190,0.35);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="hud">
  <button id="load-btn" onclick="loadAudio()">⊕ Load Audio Track</button>
  <span id="status">no track loaded — demo mode</span>
</div>

<a-scene
  background="color: #060e0a"
  fog="type: exponential; color: #0a1a10; density: 0.055"
  renderer="antialias: true; colorManagement: true"
  vr-mode-ui="enabled: true"
>

  <!-- ═══════════════════════════════════════
       CAMERA RIG — gentle underwater drift
  ════════════════════════════════════════ -->
  <a-entity id="rig" position="0 1.6 0" camera-drift>
    <a-camera
      look-controls="pointerLockEnabled: true"
      wasd-controls="acceleration: 12"
      near="0.1" far="30"
    >
      <a-cursor color="#a8d5b5" opacity="0.4" scale="0.35 0.35 0.35"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ═══════════════════════════════════════
       LIGHTING — murky underwater palette
  ════════════════════════════════════════ -->
  <!-- Ambient: deep dark green -->
  <a-light type="ambient" color="#0d2416" intensity="1.2"></a-light>

  <!-- Primary fill: cold teal from above -->
  <a-light id="light-main"
    type="point" color="#1a6b4a" intensity="1.6"
    distance="14" position="0 5 -2">
  </a-light>

  <!-- Secondary: murky green from the side -->
  <a-light id="light-side"
    type="point" color="#0e4a28" intensity="1.0"
    distance="10" position="-4 2 0">
  </a-light>

  <!-- Bass pulse light — centre of room -->
  <a-light id="light-bass"
    type="point" color="#2dcc7a" intensity="0.8"
    distance="8" position="0 2 -4">
  </a-light>

  <!-- Treble shimmer — from behind corals -->
  <a-light id="light-treble"
    type="point" color="#80ffb0" intensity="0.4"
    distance="6" position="0 3 -7">
  </a-light>

  <!-- ═══════════════════════════════════════
       ROOM GEOMETRY — bare flooded room
       Built from A-Frame primitives.
       Walls slightly darker than fog colour.
  ════════════════════════════════════════ -->

  <!-- Floor — dark, silt-covered -->
  <a-plane id="floor"
    position="0 0 0" rotation="-90 0 0"
    width="10" height="14"
    color="#060f08" metalness="0.1" roughness="1.0">
  </a-plane>

  <!-- Ceiling 
  <a-plane
    position="0 4 0" rotation="90 0 0"
    width="10" height="14"
    color="#071009" metalness="0.0" roughness="1.0">
  </a-plane> -->
  <a-plane
   id="water"
    position="0 4 0" rotation="90 0 0"
    width="10" height="14"
    color="#071009" metalness="0.9" roughness="1.0">
  </a-plane> 
     

  <!-- Back wall -->
  <a-plane
    position="0 2 -7" rotation="0 0 0"
    width="10" height="4"
    color="#081209" roughness="1.0">
  </a-plane>

  <!-- Left wall -->
  <a-plane
    position="-5 2 0" rotation="0 90 0"
    width="14" height="4"
    color="#071009" roughness="1.0">
  </a-plane>

  <!-- Right wall -->
  <a-plane
    position="5 2 0" rotation="0 -90 0"
    width="14" height="4"
    color="#071009" roughness="1.0">
  </a-plane>

  <!-- ═══════════════════════════════════════
       CAUSTIC LIGHT PANELS
       Animated planes on walls/floor simulating
       caustic water light patterns.
       Semi-transparent, slowly shifting.
  ════════════════════════════════════════ -->

  <!-- Caustic on back wall — large -->
  <a-plane id="caustic-back"
    position="0 2 -6.9" rotation="0 0 0"
    width="9" height="3.8"
    material="color: #2dcc7a; opacity: 0.04; transparent: true;
      side: front; shader: flat">
    <a-animation attribute="material.opacity"
      from="0.02" to="0.07" dur="2800"
      direction="alternate" repeat="indefinite" easing="easeInOutSine">
    </a-animation>
  </a-plane>

  <!-- Caustic on left wall -->

<!-- ═══════════════════════════════════════
     JAVASCRIPT
     Web Audio API + A-Frame components
     Audio visualisation technique adapted from:
     https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API/Visualizations_with_Web_Audio_API
════════════════════════════════════════ -->

<script>
AFRAME.registerComponent('water-animation', {
  schema: {
    frameCount:  { type: 'int',    default: 120 },
    fps:         { type: 'int',    default: 24 },
    path:        { type: 'string', default: 'assets/textures/water/' },
    repeat:      { type: 'vec2',   default: { x: 2, y: 2 } },
    normalScale: { type: 'number', default: 2.0 },
    color:       { type: 'color',  default: '#1a3a4a' }
  },

  init() {
    const size = 1024;

    this.canvas = document.createElement('canvas');
    this.canvas.width = this.canvas.height = size;
    this.ctx = this.canvas.getContext('2d');

    this.frames      = [];
    this.frameIndex  = 0;
    this.lastTime    = 0;
    this.loadedCount = 0;

    // Preload all frames
    for (let i = 1; i <= this.data.frameCount; i++) {
      const img = new Image();
      const pad = String(i).padStart(4, '0'); 
      img.src = `${this.data.path}${pad}.png`;
      img.onload = () => { this.loadedCount++; };
      this.frames.push(img);
    }

    this.el.addEventListener('loaded', () => this._applyMaterial());
  },

  _applyMaterial() {
    const THREE = AFRAME.THREE;
    const { repeat, normalScale, color } = this.data;

    this.normalTex = new THREE.CanvasTexture(this.canvas);
    this.normalTex.wrapS = this.normalTex.wrapT = THREE.RepeatWrapping;
    this.normalTex.repeat.set(repeat.x, repeat.y);

    const material = new THREE.MeshStandardMaterial({
      color:       new THREE.Color(color),
      normalMap:   this.normalTex,
      normalScale: new THREE.Vector2(normalScale, normalScale),
      roughness:   0.15,
      metalness:   0.1,
    });

    const mesh = this.el.getObject3D('mesh');
    if (mesh) mesh.material = material;
  },

  tick(time) {
    if (this.loadedCount < this.data.frameCount) return;

    const interval = 1000 / this.data.fps;
    if (time - this.lastTime < interval) return;
    this.lastTime = time;

    const i = this.frameIndex;
    this.ctx.drawImage(this.frames[i], 0, 0, this.canvas.width, this.canvas.height);
    if (this.normalTex) this.normalTex.needsUpdate = true;

    this.frameIndex = (i + 1) % this.data.frameCount;
  }
});

  document.querySelector('#water').setAttribute('water-animation', {
    frameCount:  120,
    fps:         24,
    path:        'assets/textures/water/',  // ← folder containing 0001.png … 0120.png
    repeat:      '3 3',
    normalScale: 2.0,
    color:       '#006994'           // ← tweak this for your water color
  });
</script>

<script>

  // ── Audio globals ──────────────────────────────────
  let audioCtx, analyser, source, dataArray, bufferLength;

  // FFT bin boundaries (fftSize 2048 → 1024 bins at 44.1kHz ≈ 43Hz/bin)
  const BASS_END   = 10;   // 0–430 Hz
  const MID_END    = 100;  // 430Hz–4.3kHz
  // 100–1023 = treble

  // Smoothed band values (0–1)
  let sBass = 0, sMid = 0, sTreble = 0;
  const SMOOTH = 0.12; // gentle smoothing for dreamy feel

  // Mote origin positions (populated on load)
  const moteOrigins = [];


  // ══════════════════════════════════════════════════
  //  COMPONENT: camera-drift
  //  Slow sinusoidal underwater body movement.
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('camera-drift', {
    init: function () { this.t = 0; },
    tick: function (time, delta) {
      this.t += delta * 0.00025;
      const t = this.t;
      // Very slow, subtle — like being weightless in water
      this.el.object3D.position.set(
        Math.sin(t * 0.6)  * (0.12 + sBass * 0.08),
        1.6 + Math.sin(t * 0.9) * 0.07,
        Math.cos(t * 0.4)  * (0.08 + sBass * 0.06)
      );
    }
  });


  // ══════════════════════════════════════════════════
  //  COMPONENT: coral-float
  //  Per-coral idle floating animation.
  //  schema: speed, amplitude, phase offset
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('coral-float', {
    schema: {
      speed:     { type: 'number', default: 0.4 },
      amplitude: { type: 'number', default: 0.1 },
      phase:     { type: 'number', default: 0   }
    },
    init: function () {
      this.t = 0;
      // Store the authored base Y position
      this.baseY = this.el.object3D.position.y;
    },
    tick: function (time, delta) {
      this.t += delta * 0.001;
      const t = this.t;
      const d = this.data;
      // Float up and down
      this.el.object3D.position.y =
        this.baseY + Math.sin(t * d.speed + d.phase) * d.amplitude;
      // Very slow yaw rotation
      this.el.object3D.rotation.y += 0.0002 * d.speed;
    }
  });


  // ══════════════════════════════════════════════════
  //  COMPONENT: audio-reactor
  //  Master tick — reads frequency data each frame,
  //  drives corals, lights, caustics, and sediment.
  // ══════════════════════════════════════════════════
  AFRAME.registerComponent('audio-reactor', {
    init: function () {
      this.corals = [
        document.querySelector('#coral-pocillopora'),
        document.querySelector('#coral-diploria'),
        document.querySelector('#coral-stylaster'),
      ];
      this.glows = [
        document.querySelector('#glow-pocillopora'),
        document.querySelector('#glow-diploria'),
        document.querySelector('#glow-stylaster'),
      ];
      this.lMain   = document.querySelector('#light-main');
      this.lSide   = document.querySelector('#light-side');
      this.lBass   = document.querySelector('#light-bass');
      this.lTreble = document.querySelector('#light-treble');

      this.causticBack  = document.querySelector('#caustic-back');
      this.causticLeft  = document.querySelector('#caustic-left');
      this.causticRight = document.querySelector('#caustic-right');
      this.causticFloor = document.querySelector('#caustic-floor');

      this.motes = Array.from(document.querySelectorAll('.mote'));
      this.motes.forEach(function(m, i) {
        const p = m.getAttribute('position');
        moteOrigins[i] = { x: p.x, y: p.y, z: p.z };
      });

      this.t = 0;
    },

    tick: function (time, delta) {
      this.t += delta * 0.001;
      const t = this.t;

      // ── Band values (audio or demo) ───────────────
      let rB, rM, rT;
      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        rB = avg(dataArray, 0,        BASS_END)     / 255;
        rM = avg(dataArray, BASS_END,  MID_END)     / 255;
        rT = avg(dataArray, MID_END,   bufferLength) / 255;
      } else {
        // Demo: slow, dreamlike sine waves
        rB = 0.25 + 0.18 * Math.abs(Math.sin(t * 0.8));
        rM = 0.20 + 0.15 * Math.abs(Math.sin(t * 0.6 + 1.2));
        rT = 0.15 + 0.12 * Math.abs(Math.sin(t * 1.1 + 2.5));
      }

      // Lerp — gentle, dreamlike (not snappy)
      sBass   += (rB - sBass)   * SMOOTH;
      sMid    += (rM - sMid)    * SMOOTH;
      sTreble += (rT - sTreble) * SMOOTH;

      // ── CORALS: scale + glow opacity ─────────────
      var bands = [sBass, sMid, sTreble];
      for (var i = 0; i < this.corals.length; i++) {
        var coral = this.corals[i];
        var glow  = this.glows[i];
        if (!coral) continue;

        var n = bands[i];
        // Scale: subtle pulse — 1.0 base, up to +35% on strong hit
        var s = 1.0 + n * 0.35;
        coral.object3D.scale.set(s, s, s);

        // Glow sphere opacity: 0.08 to 0.35
        if (glow) {
          var op = (0.08 + n * 0.27).toFixed(3);
          glow.setAttribute('material', 'opacity', op);
        }
      }

      // ── LIGHTS: intensity modulation ─────────────
      if (this.lMain)   this.lMain.setAttribute('intensity',   (1.2 + sBass * 1.2).toFixed(2));
      if (this.lBass)   this.lBass.setAttribute('intensity',   (0.5 + sBass * 1.8).toFixed(2));
      if (this.lTreble) this.lTreble.setAttribute('intensity', (0.3 + sTreble * 1.0).toFixed(2));
      if (this.lSide)   this.lSide.setAttribute('intensity',   (0.7 + sMid   * 0.9).toFixed(2));

      // ── CAUSTICS: opacity beat ─────────────────────
      // Bass drives caustic intensity — adds to the CSS animation base
      var cOp = (0.03 + sBass * 0.06).toFixed(3);
      if (this.causticBack)  this.causticBack.setAttribute('material',  'opacity', cOp);
      if (this.causticFloor) this.causticFloor.setAttribute('material', 'opacity', (parseFloat(cOp) * 0.7).toFixed(3));

      // ── SEDIMENT: drift downward + lateral ───────
      this.motes.forEach(function(mote, i) {
        var o = moteOrigins[i];
        if (!o) return;

        var phase  = i * 0.7;
        // Drift speed increases slightly with treble
        var speed  = 0.04 + sTreble * 0.03;
        // Lateral wobble
        var wobble = 0.08 + sMid * 0.06;

        // Y: drift downward, wrap back to top
        var ny = o.y - (t * speed * 0.5 + phase * 0.15) % 3.5;
        var nx = o.x + Math.sin(t * 0.3 + phase) * wobble;
        var nz = o.z + Math.cos(t * 0.2 + phase) * wobble * 0.5;

        mote.object3D.position.set(nx, ny, nz);
      });
    }
  });

  // Attach to scene on load
  document.querySelector('a-scene').addEventListener('loaded', function () {
    document.querySelector('a-scene').setAttribute('audio-reactor', '');
  });


  // ── Helper ────────────────────────────────────────
  function avg(arr, start, end) {
    var sum = 0;
    for (var i = start; i < end; i++) sum += arr[i];
    return sum / (end - start);
  }


  // ══════════════════════════════════════════════════
  //  AUDIO LOADING — file stays local, nothing uploaded
  // ══════════════════════════════════════════════════
  function loadAudio() {
    var input = document.createElement('input');
    input.type   = 'file';
    input.accept = 'audio/*';

    input.onchange = async function (e) {
      var file = e.target.files[0];
      if (!file) return;
      document.getElementById('status').textContent = 'decoding…';

      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }

        if (source) { try { source.stop(); } catch(err) {} }

        analyser         = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        bufferLength     = analyser.frequencyBinCount;
        dataArray        = new Uint8Array(bufferLength);

        var ab  = await file.arrayBuffer();
        var buf = await audioCtx.decodeAudioData(ab);

        source        = audioCtx.createBufferSource();
        source.buffer = buf;
        source.loop   = true;
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start(0);

        document.getElementById('status').textContent = '▶ ' + file.name;
        document.getElementById('load-btn').textContent = '⊕ Change Track';

      } catch (err) {
        console.error('Audio error:', err);
        document.getElementById('status').textContent = 'error — see console';
      }
    };

    input.click();
  }
</script>
</body>
</html>
